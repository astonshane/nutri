<table class="table table-hover sortable mb-0">
  <thead class="table-light">
    <tr>
      <th>Name</th>
      <th>Brand</th>
      <th>Source</th>
    </tr>
  </thead>
  <tbody>
    {% for food in foods %}
    <tr>
      <td>
        <a href="{{ url_for('food', id=dish.id, food_id=food.id) }}" class="text-decoration-none fw-500" style="color:var(--nutri-dark)">
          {{ food.name }}
        </a>
      </td>
      <td class="text-muted" style="font-size:.9rem">{{ food.brand }}</td>
      <td>
        {% if food.url %}
        <a href="{{ food.url }}" target="_blank" rel="noopener" class="text-muted" style="font-size:.85rem">
          <i class="bi bi-box-arrow-up-right"></i>
        </a>
        {% endif %}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
