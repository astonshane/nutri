{% extends 'base.html' %}

{% block title %}Dishes{% endblock %}

{% block header %}
<div class="page-title">
  <h1>Dishes</h1>
</div>
{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-lg-9">
    <div class="card">
      <div class="card-body p-0">
        {% include 'tables/table-of-dishes.html' %}
      </div>
    </div>
  </div>
  <div class="col-lg-3">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-plus-circle me-1" style="color:var(--nutri-primary)"></i> New Dish
      </div>
      <div class="card-body">
        <form action="{{ url_for('dishes')}}" method="post">
          <div class="mb-3">
            <label for="title" class="form-label fw-500">Title</label>
            <input type="text" class="form-control form-control-sm" id="title" name="title" placeholder="e.g. Chicken stir-fry" required>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label fw-500">Description</label>
            <input type="text" class="form-control form-control-sm" id="description" name="description" placeholder="Short description">
          </div>
          <div class="mb-3">
            <label for="url" class="form-label fw-500">Recipe URL <span class="text-muted fw-normal">(optional)</span></label>
            <input type="url" class="form-control form-control-sm" id="url" name="url" placeholder="https://...">
          </div>
          <div class="mb-3">
            <label for="servings" class="form-label fw-500"># of Servings</label>
            <input type="number" class="form-control form-control-sm" id="servings" name="servings" min="1" placeholder="1">
          </div>
          <button type="submit" class="btn btn-sm w-100" style="background:var(--nutri-primary); color:#fff">
            <i class="bi bi-plus-lg me-1"></i>Add Dish
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
