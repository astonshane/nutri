<button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#dish-update-form" aria-expanded="false">
  <i class="bi bi-pencil me-1"></i>Edit
</button>

<div class="collapse mt-3" id="dish-update-form">
  <div class="card">
    <div class="card-body">
      <form action="{{ url_for('update_dish', id=dish.id)}}" method="post">
        <div class="mb-2">
          <label for="title" class="form-label form-label-sm fw-500">Title</label>
          <input type="text" class="form-control form-control-sm" id="title" name="title" value="{{ dish.title }}" required>
        </div>
        <div class="mb-2">
          <label for="description" class="form-label form-label-sm fw-500">Description</label>
          <input type="text" class="form-control form-control-sm" id="description" name="description" value="{{ dish.description or '' }}" placeholder="Enter description">
        </div>
        <div class="mb-2">
          <label for="url" class="form-label form-label-sm fw-500">Recipe URL</label>
          <input type="url" class="form-control form-control-sm" id="url" name="url" value="{{ dish.url or '' }}" placeholder="https://...">
        </div>
        <div class="mb-3">
          <label for="portions" class="form-label form-label-sm fw-500"># of Portions</label>
          <input type="number" class="form-control form-control-sm" id="portions" name="portions" min="1" value="{{ dish.portions }}" required>
        </div>
        <button type="submit" class="btn btn-sm" style="background:var(--nutri-primary); color:#fff">
          <i class="bi bi-check-lg me-1"></i>Save
        </button>
      </form>
    </div>
  </div>
</div>
