<button class="btn btn-default btn-sm" type="button" data-toggle="collapse" data-target="#dish-update-form">
    <span class="glyphicon glyphicon-pencil"></span> Edit
</button>

<div class="collapse" id="dish-update-form">
    <form action="{{ url_for('update_dish', id=dish.id)}}" method="post" style="margin-top: 10px">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ dish.title }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" class="form-control" id="description" name="description" value="{{ dish.description or '' }}">
        </div>
        <div class="form-group">
            <label for="url">Recipe URL</label>
            <input type="url" class="form-control" id="url" name="url" value="{{ dish.url or '' }}" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="portions"># of Portions</label>
            <input type="number" class="form-control" id="portions" name="portions" min="1" value="{{ dish.portions }}" required>
        </div>
        <button type="submit" class="btn btn-info">
            Update
            <span class="glyphicon glyphicon-pencil"></span>
        </button>
    </form>
</div>
