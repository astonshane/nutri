<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% block title %}{% endblock %} - Nutri</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap.min.js"></script>
  <script>
    $(function() {
      $('table.sortable:not(.sortable-paged)').DataTable({ paging: false, searching: false, info: false });
      var q = new URLSearchParams(window.location.search).get('q') || '';
      $('table.sortable-paged').DataTable({ search: { search: q } });
    });

    // Click-to-edit ingredient quantity
    $(document).on('click', '.qty-display', function() {
      var $cell = $(this).closest('.qty-cell');
      $(this).hide();
      $cell.find('.qty-input').show().focus().select();
    });

    $(document).on('keydown blur', '.qty-input', function(e) {
      if (e.type === 'keydown' && e.key !== 'Enter' && e.key !== 'Escape') return;
      var $input = $(this);
      var $cell = $input.closest('.qty-cell');
      var $display = $cell.find('.qty-display');
      if (e.key === 'Escape') {
        $input.val($display.text().trim()).hide();
        $display.show();
        return;
      }
      var id = $cell.data('ingredient-id');
      var qty = parseFloat($input.val());
      $.post('/dishes/ingredients/' + id + '/update', { quantity: qty })
        .done(function() {
          $display.text(qty).show();
          $input.hide();

          // Update this row's nutrition cells
          var $row = $cell.closest('tr');
          $row.find('td[data-key]').each(function() {
            $(this).text(Math.round(parseFloat($(this).data('per-unit')) * qty));
          });
          $row.data('quantity', qty);

          // Recalculate totals from all rows
          var $table = $row.closest('table');
          var totals = {};
          $table.find('tbody tr[data-quantity]').each(function() {
            var rowQty = parseFloat($(this).data('quantity'));
            $(this).find('td[data-key]').each(function() {
              var key = $(this).data('key');
              totals[key] = (totals[key] || 0) + parseFloat($(this).data('per-unit')) * rowQty;
            });
          });

          // Update totals row
          $table.find('tfoot td[data-key]').each(function() {
            $(this).find('strong').text(Math.round(totals[$(this).data('key')] || 0));
          });

          // Update per-portion panel
          var portions = $table.data('portions');
          $('.per-portion-val').each(function() {
            $(this).text(Math.round((totals[$(this).data('key')] || 0) / portions));
          });
        })
        .fail(function() {
          $input.val($display.text().trim()).hide();
          $display.show();
        });
    });
  </script>
</head>
<body>

<nav class="navbar navbar-default">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="{{ url_for('index')}}">Nutri</a>
    </div>
    <ul class="nav navbar-nav">
      <li><a href="{{ url_for('dishes')}}">Dishes</a></li>
      <li><a href="#">Meals</a></li>
    </ul>
    <form class="navbar-form navbar-left" action="{{ url_for('dishes') }}" method="get">
      <div class="input-group">
        <input class="form-control" type="text" name="q" placeholder="Search recipes..." value="{{ request.args.get('q', '') }}">
        <span class="input-group-btn">
          <button type="submit" class="btn btn-default">
            <span class="glyphicon glyphicon-search"></span>
          </button>
        </span>
      </div>
    </form>
  </div>
</nav>
  
<div class="container">
  <h2>{% block header %}{% endblock %}</h2>
  {% for message in get_flashed_messages() %}
    <div class="alert alert-info alert-dismissible" role="alert">
      <button type="button" class="close" data-dismiss="alert">&times;</button>
      {{ message }}
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
