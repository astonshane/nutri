<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% block title %}{% endblock %} - Nutri</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --nutri-dark:    #1b4332;
      --nutri-primary: #2d6a4f;
      --nutri-light:   #52b788;
      --macro-fat:     #f4a261;
      --macro-carbs:   #48cae4;
      --macro-protein: #52b788;
      --macro-calories:#e63946;
    }

    body { font-family: 'Inter', sans-serif; background: #f4f6f4; }

    /* Navbar */
    .navbar { background-color: var(--nutri-dark) !important; }
    .navbar-brand { font-weight: 700; letter-spacing: -.4px; font-size: 1.25rem; }

    /* Cards */
    .card { border: 1px solid #e2e8e4; border-radius: 10px; }
    .card-header { background: #fff; border-bottom: 1px solid #e2e8e4; font-weight: 600; }

    /* Home feature cards */
    .feature-card { transition: transform .15s, box-shadow .15s; border-radius: 12px; }
    .feature-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .feature-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

    /* Nutrition macro colors */
    .macro-fat     { color: var(--macro-fat); }
    .macro-carbs   { color: var(--macro-carbs); }
    .macro-protein { color: var(--macro-protein); }

    /* Nutrition table row indicators */
    tr.nutrition-row-calories td:first-child { border-left: 3px solid var(--macro-calories); padding-left: 10px; }
    tr.nutrition-row-fat      td:first-child { border-left: 3px solid var(--macro-fat);      padding-left: 10px; }
    tr.nutrition-row-carbohydrate td:first-child { border-left: 3px solid var(--macro-carbs);   padding-left: 10px; }
    tr.nutrition-row-protein  td:first-child { border-left: 3px solid var(--macro-protein);  padding-left: 10px; }

    /* Macro badge pills in tables */
    .macro-badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: .78rem; font-weight: 600;
    }
    .badge-calories { background: #fde8ea; color: #c1121f; }
    .badge-carbs    { background: #e0f5fb; color: #0077a8; }
    .badge-protein  { background: #e4f5ec; color: #1b7040; }

    /* Click-to-edit quantity */
    .qty-display { cursor: pointer; border-bottom: 1px dashed #aaa; }
    .qty-input   { width: 80px; }

    /* Delete button visible only on row hover */
    .action-btn { opacity: 0; transition: opacity .15s; }
    tr:hover .action-btn { opacity: 1; }

    /* Page title area */
    .page-title { margin-bottom: 1.5rem; }
    .page-title h1 { font-weight: 700; font-size: 1.75rem; margin-bottom: .15rem; }
    .page-title .text-muted { font-size: .95rem; }
    .fw-500 { font-weight: 500 !important; }
    .fw-600 { font-weight: 600 !important; }

    /* ===== Table redesign ===== */

    /* Strip all borders — we'll add only what we want */
    .table { border-collapse: collapse; }
    .table > :not(caption) > * > * {
      border-right: none !important;
      border-left: none !important;
      box-shadow: none !important;
    }

    /* Column headers */
    .table > thead > tr > th,
    .table > thead.table-light > tr > th {
      background: #fff !important;
      color: var(--nutri-primary);
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      border-top: none !important;
      border-bottom: 2px solid var(--nutri-primary) !important;
      padding: .7rem .85rem;
      white-space: nowrap;
    }

    /* DataTables sort arrows: tint to match header */
    table.dataTable thead th.sorting::before,
    table.dataTable thead th.sorting::after,
    table.dataTable thead th.sorting_asc::after,
    table.dataTable thead th.sorting_desc::after { color: var(--nutri-light); }

    /* Body rows */
    .table > tbody > tr > td {
      border-bottom: 1px solid #edf2ef !important;
      vertical-align: middle;
      padding: .65rem .85rem;
      color: #2e3a35;
    }
    .table > tbody > tr:last-child > td { border-bottom: none !important; }

    /* Hover */
    .table-hover > tbody > tr:hover > td {
      background-color: #f0f7f4 !important;
    }

    /* Footer / totals row */
    .table > tfoot > tr > td {
      background: #f5fbf8 !important;
      border-top: 2px solid var(--nutri-light) !important;
      border-bottom: none !important;
      padding: .7rem .85rem;
      color: var(--nutri-dark);
    }

    /* ===== DataTables controls ===== */
    .dataTables_wrapper {
      padding: .85rem 1rem;
    }
    .dataTables_wrapper .dataTables_filter,
    .dataTables_wrapper .dataTables_length {
      margin-bottom: .5rem;
    }
    .dataTables_wrapper .dataTables_filter label,
    .dataTables_wrapper .dataTables_length label {
      font-size: .82rem;
      color: #6c7c74;
      font-weight: 500;
      gap: .4rem;
      display: flex;
      align-items: center;
    }
    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select {
      border: 1px solid #cdd9d4;
      border-radius: 6px;
      padding: .3rem .55rem;
      font-size: .82rem;
      color: #2e3a35;
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .dataTables_wrapper .dataTables_filter input:focus,
    .dataTables_wrapper .dataTables_length select:focus {
      border-color: var(--nutri-primary);
      box-shadow: 0 0 0 3px rgba(45,106,79,.12);
    }
    .dataTables_wrapper .dataTables_info {
      font-size: .78rem;
      color: #9eb3a9;
      padding-top: .6rem;
    }

    /* Pagination */
    .dataTables_wrapper .pagination { gap: 3px; }
    .dataTables_wrapper .pagination .page-link {
      border-radius: 6px !important;
      color: var(--nutri-primary);
      border-color: #cdd9d4;
      font-size: .82rem;
      padding: .3rem .6rem;
      transition: background .12s, border-color .12s;
    }
    .dataTables_wrapper .pagination .page-item.active .page-link {
      background: var(--nutri-primary);
      border-color: var(--nutri-primary);
      color: #fff;
    }
    .dataTables_wrapper .pagination .page-link:hover {
      background: #e4f0ea;
      border-color: var(--nutri-primary);
      color: var(--nutri-dark);
    }
    .dataTables_wrapper .pagination .page-item.disabled .page-link {
      color: #bfcfc9;
      border-color: #e5ecea;
    }
  </style>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <script>
    var macroChart = null;

    function getMacroData() {
      return [
        parseFloat($('.per-portion-val[data-key="fat"]').text()),
        parseFloat($('.per-portion-val[data-key="carbohydrate"]').text()),
        parseFloat($('.per-portion-val[data-key="protein"]').text()),
      ];
    }

    $(function() {
      $('table.sortable:not(.sortable-paged)').DataTable({ paging: false, searching: false, info: false });
      var q = new URLSearchParams(window.location.search).get('q') || '';
      $('table.sortable-paged').DataTable({ search: { search: q } });

      var chartCanvas = document.getElementById('macro-chart');
      if (chartCanvas) {
        macroChart = new Chart(chartCanvas, {
          type: 'pie',
          data: {
            labels: ['Fat', 'Carbs', 'Protein'],
            datasets: [{ data: getMacroData(), backgroundColor: ['#f4a261', '#48cae4', '#52b788'], borderWidth: 0 }]
          },
          options: { plugins: { legend: { position: 'bottom' } } }
        });
      }
    });

    $(document).on('click', '.qty-display', function() {
      var $cell = $(this).closest('.qty-cell');
      $(this).hide();
      $cell.find('.qty-input').show().focus().select();
    });

    $(document).on('keydown blur', '.qty-input', function(e) {
      if (e.type === 'keydown' && e.key !== 'Enter' && e.key !== 'Escape') return;
      var $input = $(this);
      var $cell = $input.closest('.qty-cell');
      var $display = $cell.find('.qty-display');
      if (e.key === 'Escape') {
        $input.val($display.text().trim()).hide();
        $display.show();
        return;
      }
      var id = $cell.data('ingredient-id');
      var qty = parseFloat($input.val());
      $.post('/dishes/ingredients/' + id + '/update', { quantity: qty })
        .done(function() {
          $display.text(qty).show();
          $input.hide();

          var $row = $cell.closest('tr');
          $row.find('td[data-key]').each(function() {
            $(this).text(Math.round(parseFloat($(this).data('per-unit')) * qty));
          });
          $row.data('quantity', qty);

          var $table = $row.closest('table');
          var totals = {};
          $table.find('tbody tr[data-quantity]').each(function() {
            var rowQty = parseFloat($(this).data('quantity'));
            $(this).find('td[data-key]').each(function() {
              var key = $(this).data('key');
              totals[key] = (totals[key] || 0) + parseFloat($(this).data('per-unit')) * rowQty;
            });
          });

          $table.find('tfoot td[data-key]').each(function() {
            $(this).find('strong').text(Math.round(totals[$(this).data('key')] || 0));
          });

          var portions = $table.data('portions');
          $('.per-portion-val').each(function() {
            $(this).text(Math.round((totals[$(this).data('key')] || 0) / portions));
          });

          if (macroChart) {
            macroChart.data.datasets[0].data = getMacroData();
            macroChart.update();
          }
        })
        .fail(function() {
          $input.val($display.text().trim()).hide();
          $display.show();
        });
    });
  </script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="{{ url_for('index')}}">
      <i class="bi bi-leaf-fill me-1" style="color: var(--nutri-light)"></i>Nutri
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint in ('dishes', 'dish') %}active fw-semibold{% endif %}" href="{{ url_for('dishes')}}">Dishes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled text-muted">Meals <span class="badge bg-secondary ms-1" style="font-size:.65rem">soon</span></a>
        </li>
      </ul>
      <form class="d-flex" action="{{ url_for('dishes') }}" method="get">
        <div class="input-group input-group-sm">
          <input class="form-control" type="text" name="q" placeholder="Search recipes..." value="{{ request.args.get('q', '') }}">
          <button type="submit" class="btn btn-outline-light">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% block header %}{% endblock %}
  {% for message in get_flashed_messages() %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
